<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Stock Cut Optimizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f2;color:#1a1a18;min-height:100vh;padding:1.5rem}
h1{font-size:1.3rem;font-weight:600;margin-bottom:1.5rem}
.card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.row{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem}
.field{display:flex;flex-direction:column;gap:4px;min-width:120px;flex:1}
label{font-size:12px;color:#666;font-weight:500}
input[type=number]{border:0.5px solid #ccc;border-radius:6px;padding:6px 10px;font-size:14px;width:100%;outline:none;background:#fff;color:#1a1a18}
input:focus{border-color:#5a7fc9;box-shadow:0 0 0 2px rgba(90,127,201,0.15)}
.parts-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.parts-row input{flex:1}
.btn-sm{background:transparent;border:0.5px solid #ccc;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:#555}
.btn-sm:hover{background:#f0f0ec;border-color:#aaa}
.btn-primary{background:#3a6bc9;color:#fff;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;font-size:14px;font-weight:500}
.btn-primary:hover{background:#2d5ab5}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.stat{background:#f5f5f2;border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;color:#1a1a18}
.stat-val.good{color:#2d7a45}
.stat-val.warn{color:#b06020}
.bar-container{margin-bottom:18px}
.bar-label{font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
svg.bar-vis{width:100%;height:36px;border-radius:6px;overflow:visible}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:11px;color:#555}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
#status{font-size:13px;color:#888;margin-top:8px;min-height:18px}
.section-title{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.add-part-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
</style>
</head>
<body>
<h1>Bar Stock Cut Optimizer</h1>

<div class="card">
  <div class="row">
    <div class="field">
      <label>Stock length (in)</label>
      <input type="number" id="stockLen" value="72" min="1" step="0.125">
    </div>
    <div class="field">
      <label>Kerf (in)</label>
      <input type="number" id="kerf" value="0.125" min="0" step="0.0625">
    </div>
  </div>
  <div class="section-title">Parts needed</div>
  <div id="partsList"></div>
  <div class="add-part-row" style="margin-top:8px">
    <div class="field" style="min-width:100px;max-width:140px">
      <label>Length (in)</label>
      <input type="number" id="newLen" value="12" min="0.1" step="0.125">
    </div>
    <div class="field" style="min-width:80px;max-width:120px">
      <label>Qty</label>
      <input type="number" id="newQty" value="4" min="1" step="1">
    </div>
    <button class="btn-sm" id="addBtn">+ Add</button>
  </div>
  <div style="margin-top:1.25rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <button class="btn-primary" id="solveBtn">Optimize cuts</button>
    <div id="status"></div>
  </div>
</div>

<div class="card" id="resultsCard" style="display:none">
  <div class="section-title">Results</div>
  <div class="stat-grid" id="statsGrid"></div>
  <div id="visualization"></div>
  <div class="legend" id="legend"></div>
</div>

<script>
const COLORS = ['#4a7fd4','#5ba85c','#d47a4a','#a855a0','#d4b94a','#4ab8d4','#d44a6a','#7a9e4a','#d4664a','#4a9ed4'];

let parts = [];
let nextId = 0;

function addPart(len, qty) {
  len = len || parseFloat(document.getElementById('newLen').value);
  qty = qty || parseInt(document.getElementById('newQty').value);
  if (isNaN(len) || len <= 0 || isNaN(qty) || qty < 1) return;
  parts.push({id: nextId++, len, qty});
  renderParts();
  syncURL();
}

function removePart(id) {
  parts = parts.filter(p => p.id !== id);
  renderParts();
  syncURL();
}

function renderParts() {
  const el = document.getElementById('partsList');
  el.innerHTML = '';
  parts.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'parts-row';
    row.innerHTML = `<span style="min-width:20px;color:#888;font-size:12px">${i+1}.</span>
      <input type="number" value="${p.len}" min="0.1" step="0.125" style="max-width:110px" data-idx="${i}" data-field="len">
      <span style="font-size:12px;color:#888">in ×</span>
      <input type="number" value="${p.qty}" min="1" step="1" style="max-width:70px" data-idx="${i}" data-field="qty">
      <button class="btn-sm" data-remove="${p.id}" style="color:#c04040;border-color:#e8c0c0">✕</button>`;
    el.appendChild(row);
  });
}

function syncURL() {
  const stockLen = document.getElementById('stockLen').value;
  const kerf = document.getElementById('kerf').value;
  const ps = parts.map(p => `${p.len}x${p.qty}`).join(',');
  const params = new URLSearchParams({stockLen, kerf, parts: ps});
  history.replaceState(null,'','?'+params.toString());
}

function loadFromURL() {
  const p = new URLSearchParams(location.search);
  if (p.has('stockLen')) document.getElementById('stockLen').value = p.get('stockLen');
  if (p.has('kerf')) document.getElementById('kerf').value = p.get('kerf');
  if (p.has('parts') && p.get('parts')) {
    p.get('parts').split(',').forEach(s => {
      const m = s.match(/^([\d.]+)x(\d+)$/);
      if (m) addPart(parseFloat(m[1]), parseInt(m[2]));
    });
  }
  if (!parts.length) {
    addPart(12, 4); addPart(16, 3); addPart(20, 2); addPart(24, 2);
  }
}

['stockLen','kerf'].forEach(id => document.getElementById(id).addEventListener('change', syncURL));
document.getElementById('addBtn').addEventListener('click', () => addPart());
document.getElementById('solveBtn').addEventListener('click', solve);
document.getElementById('partsList').addEventListener('change', e => {
  const idx = e.target.dataset.idx, field = e.target.dataset.field;
  if (idx === undefined) return;
  if (field === 'len') parts[idx].len = parseFloat(e.target.value) || parts[idx].len;
  if (field === 'qty') parts[idx].qty = parseInt(e.target.value) || parts[idx].qty;
  syncURL();
});
document.getElementById('partsList').addEventListener('click', e => {
  const id = e.target.dataset.remove;
  if (id !== undefined) removePart(+id);
});

// --- Generate all valid cut patterns for given part sizes and stock length ---
// A pattern is an array of counts, one per part type, that fits in one bar.
function genPatterns(lengths, stockLen, kerf) {
  const n = lengths.length;
  const patterns = [];
  // remaining: space left in bar. totalPieces: pieces placed so far (to count kerfs).
  function recurse(idx, remaining, totalPieces, counts) {
    if (idx === n) {
      if (totalPieces > 0) patterns.push([...counts]);
      return;
    }
    // Each additional piece costs length + kerf (kerf is a saw cut before each piece after the first)
    const pieceSpace = lengths[idx] + (totalPieces > 0 ? kerf : 0);
    const maxK = Math.floor(remaining / pieceSpace);
    // Try placing 0..maxK of this part type, consuming space greedily
    let rem = remaining;
    for (let k = 0; k <= maxK; k++) {
      counts[idx] = k;
      recurse(idx + 1, rem, totalPieces + k, counts);
      // add one more piece of this type
      rem -= (totalPieces + k > 0 ? kerf : 0) + lengths[idx];
    }
    counts[idx] = 0;
  }
  recurse(0, stockLen, 0, new Array(n).fill(0));
  return patterns;
}

// --- Branch-and-bound solver ---
// Finds minimum bars (allowing overage on qty — cuts >= demand).
function bnbSolve(patterns, demand, stockLen, lengths, kerf) {
  const n = demand.length;
  let bestBars = Infinity;
  let bestAssignment = null;

  // Upper bound via greedy BFD
  const bfdResult = bfd(lengths, demand, stockLen, kerf);
  bestBars = bfdResult.length;
  bestAssignment = bfdResult.map(b => b.patternIdx);

  // Sort patterns by "value" — total material used descending
  const scored = patterns.map((p, i) => {
    const used = p.reduce((s,c,j)=>s+c*lengths[j],0) + Math.max(0,(p.reduce((s,c)=>s+(c>0?1:0),0)-1))*kerf;
    return {p, i, used};
  }).sort((a,b)=>b.used-a.used);
  const sortedPatterns = scored.map(s=>s.p);

  const chosen = []; // pattern indices chosen so far

  function remaining(filled) {
    return demand.map((d,i) => Math.max(0, d - filled[i]));
  }

  function lowerBound(rem) {
    // Simple lower bound: max over each part type of ceil(remaining/max that fits per bar)
    let lb = 0;
    for (let i = 0; i < n; i++) {
      if (rem[i] <= 0) continue;
      const maxPerBar = Math.max(...sortedPatterns.map(p=>p[i]));
      if (maxPerBar === 0) return Infinity;
      lb = Math.max(lb, Math.ceil(rem[i] / maxPerBar));
    }
    return lb;
  }

  function search(filled, barsUsed) {
    const rem = remaining(filled);
    if (rem.every(r => r <= 0)) {
      if (barsUsed < bestBars) {
        bestBars = barsUsed;
        bestAssignment = [...chosen];
        console.log(`[B&B] new best: ${bestBars} bars`);
      }
      return;
    }
    if (barsUsed + lowerBound(rem) >= bestBars) return; // prune

    // Pick the part type with highest remaining demand to branch on
    const pivotIdx = rem.indexOf(Math.max(...rem));

    for (const p of sortedPatterns) {
      if (p[pivotIdx] === 0) continue; // must make progress on pivot
      chosen.push(p);
      const newFilled = filled.map((f,i) => f + p[i]);
      search(newFilled, barsUsed + 1);
      chosen.pop();
    }
  }

  search(new Array(n).fill(0), 0);
  return {bars: bestBars, assignment: bestAssignment};
}

// BFD returning pattern indices
function bfd(lengths, demand, stockLen, kerf) {
  const allParts = [];
  demand.forEach((qty, i) => { for (let j=0; j<qty; j++) allParts.push(i); });
  allParts.sort((a,b) => lengths[b]-lengths[a]);

  const bars = [];
  for (const pi of allParts) {
    let bestBar = null, bestRem = Infinity;
    for (const bar of bars) {
      const needed = (bar.counts.some(c=>c>0) ? kerf : 0) + lengths[pi];
      const rem = bar.remaining - needed;
      if (rem >= -1e-9 && rem < bestRem) { bestRem = rem; bestBar = bar; }
    }
    if (bestBar) {
      bestBar.counts[pi]++;
      bestBar.remaining -= ((bestBar.counts.some((c,i)=>c>0&&i!==pi)||bestBar.counts[pi]>1) ? kerf : 0) + lengths[pi];
    } else {
      const counts = new Array(lengths.length).fill(0);
      counts[pi] = 1;
      bars.push({counts, remaining: stockLen - lengths[pi]});
    }
  }
  return bars;
}

function solve() {
  const stockLen = parseFloat(document.getElementById('stockLen').value);
  const kerf = parseFloat(document.getElementById('kerf').value)||0;
  if (!parts.length) { setStatus('Add at least one part.'); return; }

  const lengths = parts.map(p=>p.len);
  const demand = parts.map(p=>p.qty);

  const oversized = lengths.filter(l=>l>stockLen);
  if (oversized.length) { setStatus(`Error: part ${oversized[0]}" exceeds stock ${stockLen}"`); return; }

  document.getElementById('solveBtn').disabled = true;
  setStatus('Generating patterns...');

  setTimeout(() => {
    const t0 = performance.now();

    console.log('=== Bar Stock Optimizer v2 ===');
    console.log(`Stock: ${stockLen}"  Kerf: ${kerf}"  Parts: ${lengths.map((l,i)=>l+'"x'+demand[i]).join(', ')}`);

    console.log('[patterns] generating...');
    const tp0 = performance.now();
    const patterns = genPatterns(lengths, stockLen, kerf);
    console.log(`[patterns] done in ${(performance.now()-tp0).toFixed(1)}ms — ${patterns.length} patterns`);
    if (!patterns.length) { setStatus('Error: no valid patterns found.'); document.getElementById('solveBtn').disabled=false; return; }
    console.log('[patterns] samples:', patterns.slice(0,5).map(p=>p.map((c,i)=>c?`${c}x${lengths[i]}"`:'').filter(Boolean).join('+')));

    setStatus('Solving...');
    setTimeout(() => {
      const {bars, assignment} = bnbSolve(patterns, demand, stockLen, lengths, kerf);

      // Reconstruct bar objects from assignment
      const result = assignment.map(p => {
        const counts = p;
        const totalParts = counts.reduce((s,c)=>s+c,0);
        const used = counts.reduce((s,c,i)=>s+c*lengths[i],0) + Math.max(0,(totalParts-1))*kerf;
        const waste = stockLen - used;
        const cuts = [];
        counts.forEach((c,i) => { for(let j=0;j<c;j++) cuts.push({len:lengths[i],colorIdx:i%COLORS.length}); });
        cuts.sort((a,b)=>b.len-a.len);
        return {cuts, waste, counts};
      });

      const elapsed = (performance.now()-t0).toFixed(1);
      const totalWaste = result.reduce((s,b)=>s+b.waste,0);
      const minPart = Math.min(...lengths);
      const unusable = result.filter(b=>b.waste<minPart&&b.waste>0.001).reduce((s,b)=>s+b.waste,0);
      const eff = (result.reduce((s,b)=>s+b.cuts.reduce((ss,c)=>ss+c.len,0),0)/(bars*stockLen)*100).toFixed(1);

      console.log(`[result] ${bars} bars, efficiency: ${eff}%, total waste: ${totalWaste.toFixed(3)}", time: ${elapsed}ms`);
      console.log('[result] layout:', result.map((b,i)=>`bar${i+1}:[${b.cuts.map(c=>c.len+'"').join(',')}] drop:${b.waste.toFixed(3)}"`).join('  '));

      setStatus(`Solved in ${elapsed}ms — ${patterns.length} patterns, branch-and-bound`);
      showResults(result, stockLen, kerf, minPart);
      document.getElementById('solveBtn').disabled = false;
    }, 10);
  }, 10);
}

function showResults(bars, stockLen, kerf, minPart) {
  const totalBars = bars.length;
  const totalWaste = bars.reduce((s,b)=>s+b.waste,0);
  const unusableWaste = bars.filter(b=>b.waste<minPart&&b.waste>0.001).reduce((s,b)=>s+b.waste,0);
  const eff = (bars.reduce((s,b)=>s+b.cuts.reduce((ss,c)=>ss+c.len,0),0)/(totalBars*stockLen)*100).toFixed(1);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-label">Bars of stock</div><div class="stat-val">${totalBars}</div></div>
    <div class="stat"><div class="stat-label">Efficiency</div><div class="stat-val ${parseFloat(eff)>=90?'good':'warn'}">${eff}%</div></div>
    <div class="stat"><div class="stat-label">Total waste</div><div class="stat-val warn">${totalWaste.toFixed(3)}"</div></div>
    <div class="stat"><div class="stat-label">Unusable drops</div><div class="stat-val">${unusableWaste.toFixed(3)}"</div></div>
  `;

  const vizEl = document.getElementById('visualization');
  vizEl.innerHTML = '';

  bars.forEach((bar, bi) => {
    const wrap = document.createElement('div');
    wrap.className = 'bar-container';
    let lbl = `Bar ${bi+1} — ${bar.cuts.length} cut${bar.cuts.length!==1?'s':''}, waste: ${bar.waste.toFixed(3)}"`;
    if (bar.waste < minPart && bar.waste > 0.001) lbl += ' (unusable)';
    wrap.innerHTML = `<div class="bar-label">${lbl}</div>`;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','bar-vis');
    svg.setAttribute('viewBox','0 0 1000 36');
    svg.setAttribute('preserveAspectRatio','none');

    let x = 0;
    const scale = 1000/stockLen;

    bar.cuts.forEach((cut,ci) => {
      if (ci > 0 && kerf > 0) {
        const kw = Math.max(kerf*scale, 1.5);
        const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
        r.setAttribute('x',x); r.setAttribute('y',0);
        r.setAttribute('width',kw); r.setAttribute('height',36);
        r.setAttribute('fill','#1a1a18');
        svg.appendChild(r); x += kw;
      }
      const w = cut.len*scale;
      const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x',x); r.setAttribute('y',0);
      r.setAttribute('width',w); r.setAttribute('height',36);
      r.setAttribute('fill',COLORS[cut.colorIdx]);
      r.setAttribute('rx','2');
      svg.appendChild(r);
      if (w > 50) {
        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',x+w/2); t.setAttribute('y',22);
        t.setAttribute('text-anchor','middle');
        t.setAttribute('fill','rgba(255,255,255,0.9)');
        t.setAttribute('font-size','13');
        t.setAttribute('font-family','system-ui,sans-serif');
        t.setAttribute('font-weight','500');
        t.textContent = cut.len+'"';
        svg.appendChild(t);
      }
      x += w;
    });

    if (bar.waste > 0.001) {
      const ww = bar.waste*scale;
      const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x',x); r.setAttribute('y',0);
      r.setAttribute('width',ww); r.setAttribute('height',36);
      r.setAttribute('fill', bar.waste < minPart ? '#e8c0a0' : '#d8ead8');
      r.setAttribute('rx','2');
      svg.appendChild(r);
      if (ww > 40) {
        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',x+ww/2); t.setAttribute('y',22);
        t.setAttribute('text-anchor','middle');
        t.setAttribute('fill', bar.waste < minPart ? '#7a3a10' : '#2a6a2a');
        t.setAttribute('font-size','12');
        t.setAttribute('font-family','system-ui,sans-serif');
        t.textContent = bar.waste.toFixed(2)+'"';
        svg.appendChild(t);
      }
    }

    wrap.appendChild(svg);
    vizEl.appendChild(wrap);
  });

  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  parts.forEach((p,i) => {
    legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></span>${p.len}" parts</span>`;
  });
  legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:#d8ead8"></span>usable drop</span>`;
  legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:#e8c0a0"></span>unusable drop</span>`;
  if (kerf > 0) legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:#1a1a18"></span>kerf</span>`;

  document.getElementById('resultsCard').style.display='';
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

loadFromURL();
</script>
</body>
</html>
